<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mission Control Submission</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f2efe9;
    }
    .wrapper {
      width: 100%;
      background-color: #0b0b0d;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: linear-gradient(135deg, #120204 0%, #08080a 70%, #020205 100%);
      border: 1px solid #c1121f;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(193, 18, 31, 0.25);
      padding: 40px;
      box-sizing: border-box;
    }
    .header-line {
      text-align: center;
      margin-bottom: 30px;
    }
    .header-dash {
      display: inline-block;
      width: 30px;
      height: 2px;
      background-color: #c1121f;
      vertical-align: middle;
      margin: 0 15px;
    }
    .header-text {
      display: inline-block;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #ffffff;
      margin: 0;
      vertical-align: middle;
    }
    .subheader {
      text-align: center;
      font-size: 13px;
      letter-spacing: 1px;
      color: rgba(242, 239, 233, 0.7);
      margin-top: -20px;
      margin-bottom: 40px;
    }
    .grid {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }
    .grid td {
      padding: 15px;
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      vertical-align: top;
    }
    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
    }
    .value {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
    }
    .pill {
      display: inline-block;
      background-color: #c1121f;
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(193, 18, 31, 0.5);
    }
    .briefing-box {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 20px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(242, 239, 233, 0.9);
      white-space: pre-wrap;
    }
    .footer {
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header-line">
        <span class="header-dash"></span>
        <h1 class="header-text">Mission Control</h1>
        <span class="header-dash"></span>
      </div>
      <div class="subheader">New Project Inquiry Received</div>
      
      <table class="grid">
        <tr>
          <td width="50%">
            <div class="label">Codename / Name</div>
            <div class="value">{{ name }}</div>
          </td>
          <td width="50%">
            <div class="label">Communication Channel</div>
            <div class="value">{{ email }}</div>
          </td>
        </tr>
        <tr>
          <td width="50%">
            <div class="label">Mission Type</div>
            <div class="value">
              <span class="pill">{{ mission_type }}</span>
            </div>
          </td>
          <td width="50%">
            <div class="label">Resource Allocation (Budget)</div>
            <div class="value">
              <span class="pill">{{ budget }}</span>
            </div>
          </td>
        </tr>
      </table>
      
      <div class="label" style="margin-left: 2px;">Briefing</div>
      <div class="briefing-box">{{ briefing }}</div>
      
      <div class="footer">
        BLOODNEXUS STUDIO &copy; 2026 &middot; LAUNCH SEQUENCE INITIATED
      </div>
    </div>
  </div>
</body>
</html>
